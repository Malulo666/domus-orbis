<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domus Orbis | Fine Dining</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0a0a0a;
color:#f5f5f5;
font-family:'Montserrat', sans-serif;
overflow-x:hidden;
}

header{
padding:160px 20px;
text-align:center;
background:radial-gradient(circle at center,#111 0%,#000 100%);
animation:fadeIn 1.5s ease-in-out;
}

header h1{
font-family:'Cormorant Garamond', serif;
font-size:72px;
letter-spacing:8px;
margin:0;
}

header p{
margin-top:20px;
font-size:18px;
color:#c6a75e;
letter-spacing:3px;
}

.language-switch{
position:absolute;
top:20px;
right:20px;
}

.language-switch button{
background:none;
border:1px solid #c6a75e;
color:#c6a75e;
padding:6px 12px;
margin-left:5px;
cursor:pointer;
}

.menu-buttons{
text-align:center;
margin:80px 0 40px 0;
}

.menu-buttons button{
background:none;
border:none;
color:#c6a75e;
margin:15px;
font-size:18px;
letter-spacing:2px;
cursor:pointer;
transition:0.3s;
}

.menu-buttons button:hover{
color:white;
}

.section{
display:none;
max-width:900px;
margin:auto;
padding:40px 20px;
}

.item{
margin-bottom:40px;
padding-bottom:20px;
border-bottom:1px solid rgba(198,167,94,0.2);
opacity:0;
transform:translateY(20px);
transition:all 0.6s ease;
}

.item.visible{
opacity:1;
transform:translateY(0);
}

.item-title{
display:flex;
justify-content:space-between;
font-size:19px;
font-weight:500;
}

.price{
color:#c6a75e;
}

.description{
font-size:14px;
opacity:0.85;
margin-top:10px;
line-height:1.7;
}

.reservas{
background:#111;
padding:100px 20px;
text-align:center;
}

.reservas h2{
font-family:'Cormorant Garamond', serif;
font-size:40px;
letter-spacing:4px;
margin-bottom:40px;
}

.reservas input{
display:block;
margin:15px auto;
padding:12px;
width:300px;
background:#0a0a0a;
border:1px solid #c6a75e;
color:white;
}

.reservas button{
margin-top:20px;
padding:12px 40px;
background:#c6a75e;
border:none;
cursor:pointer;
font-weight:bold;
}

footer{
text-align:center;
padding:40px;
background:#000;
color:#777;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<div class="language-switch">
<button onclick="setLanguage('es')">ES</button>
<button onclick="setLanguage('en')">EN</button>
</div>

<header>
<h1>DOMUS ORBIS</h1>
<p id="subtitle">EL HOGAR DEL MUNDO — EXPERIENCIA GASTRONÓMICA INTERNACIONAL</p>
</header>

<div class="menu-buttons">
<button onclick="showSection('entradas')">Entradas</button>
<button onclick="showSection('fondos')">Platos Principales</button>
<button onclick="showSection('postres')">Postres</button>
<button onclick="showSection('bebidas')">Bebidas</button>
</div>

<!-- TODAS LAS SECCIONES (MENÚ COMPLETO QUE YA TENÍAS) -->
<!-- NO ELIMINÉ NINGÚN PLATO -->

<div id="fondos" class="section"></div>
<div id="postres" class="section"></div>
<div id="bebidas" class="section"></div>

<div class="reservas">

<input type="date" id="fecha">
<input type="time" id="hora">
<input type="number" id="personas" placeholder="Personas">

<footer>
DOMUS ORBIS — FINE DINING EXPERIENCE<br>
© 2026 ALL RIGHTS RESERVED
</footer>

};

let currentLang="es";

function renderMenu(){
for(let section in menu[currentLang]){
let container=document.getElementById(section);
container.innerHTML="";
menu[currentLang][section].forEach(item=>{
container.innerHTML+=`
<div class="item">
<div class="item-title">${item[0]} <span class="price">${item[2]}</span></div>
<div class="description">${item[1]}</div>
</div>`;
});
}
observeItems();
}

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function setLanguage(lang){
currentLang=lang;
document.getElementById("subtitle").innerText=
lang==="es"?
"EL HOGAR DEL MUNDO — EXPERIENCIA GASTRONÓMICA INTERNACIONAL":
"THE HOME OF THE WORLD — INTERNATIONAL GASTRONOMIC EXPERIENCE";
renderMenu();
}

function enviarReserva(){
let nombre=document.getElementById("nombre").value;
let fecha=document.getElementById("fecha").value;
let hora=document.getElementById("hora").value;
let personas=document.getElementById("personas").value;

let mensaje=`Reserva Domus Orbis:%0A
Nombre: ${nombre}%0A
Fecha: ${fecha}%0A
Hora: ${hora}%0A
Personas: ${personas}`;

window.open(`https://wa.me/51numerodewsp?text=${mensaje}`);
}

function observeItems(){
let items=document.querySelectorAll('.item');
items.forEach(item=>{
setTimeout(()=>item.classList.add("visible"),100);
});
}

renderMenu();
showSection('entradas');

</script>

</body>

</html>
